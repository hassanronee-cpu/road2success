<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আলোর কাফেলা | স্মার্ট বাজেট ২০২৬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0fdf4; padding-bottom: 100px; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #dcfce7; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .btn-green { background: #16a34a; color: white; transition: 0.3s; font-weight: bold; border-radius: 16px; }
        .btn-green:hover { background: #15803d; transform: translateY(-1px); }
        .input-box { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid #bbf7d0; outline: none; transition: 0.3s; background: white; }
        .input-box:focus { border-color: #16a34a; box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1); }
        .active-tab { background: #16a34a !important; color: white !important; }
        .sync-loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .sync-btn-floating {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: #10b981; color: white; padding: 15px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; transition: 0.3s; border: none; cursor: pointer;
        }
        .budget-info-tag { font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 8px; margin-top: 5px; display: inline-block; }
          .islamic-pattern {
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            background-color: #064e3b;
        }
    </style>
</head>
    <script src="security.js"></script>
<body>
    <header class="islamic-pattern text-white py-5 text-center mb-6 shadow-inner">
        <div class="max-w-2xl mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight">আর্থিক হিসাব</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-5">
            <div class="glass-card p-6 border-t-8 border-emerald-600 sticky top-10">
                <h2 class="text-xl font-bold text-emerald-900 mb-4 text-center">এন্ট্রি করুন ✍️</h2>
                <div class="flex bg-emerald-50 p-1 rounded-2xl mb-6">
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl font-bold text-sm active-tab">খরচ</button>
                    <button onclick="setMode('adjustment')" id="modeAdj" class="flex-1 py-3 rounded-xl font-bold text-sm text-emerald-700">সংশোধন</button>
                </div>

                <div class="space-y-4">
                    <input type="date" id="date" class="input-box">
                    
                    <div id="expenseFields" class="space-y-4">
                        <div>
                            <select id="mainCat" onchange="updateSubCategories()" class="input-box">
                                <option value="">মূল খাত বেছে নিন</option>
                                <option value="Installment">Installment (কিস্তি)</option>
                                <option value="Homeland">Homeland (গ্রামের বাড়ি)</option>
                                <option value="Residential">Residential (বাসস্থান)</option>
                                <option value="Sustenance">Sustenance (খাদ্য)</option>
                                <option value="Transport">Transport (যাতায়াত)</option>
                                <option value="Charity">Charity (সদাকাহ)</option>
                                <option value="Essential">Essential (প্রয়োজনীয়)</option>
                                <option value="Emergency">Emergency (জরুরি)</option>
                                <option value="Refreshment">Refreshment (বিনোদন)</option>
                                <option value="Savings">Savings (সঞ্চয়)</option>
                            </select>
                            <div id="mainCatInfo" class="mt-2 flex flex-wrap gap-1"></div>
                        </div>

                        <div>
                            <select id="subCat" onchange="updateSubDetailedInfo(this.value)" class="input-box">
                                <option value="">উপ-খাত বেছে নিন</option>
                            </select>
                            <div id="subCatInfo" class="mt-2 flex flex-wrap gap-1"></div>
                        </div>
                    </div>

                    <div id="adjFields" class="hidden space-y-4">
                        <select id="adjMain" onchange="updateAdjSub()" class="input-box">
                            <option value="">সংশোধন খাত বেছে নিন</option>
                            <option value="Earnings">Earnings (আয়)</option>
                            <option value="Liability">Liability (ঋণ)</option>
                            <option value="Investment">Investment (বিনিয়োগ)</option>
                        </select>
                        <select id="adjSub" onchange="checkOthers(this.value)" class="input-box"><option value="">উপ-খাত বেছে নিন</option></select>
                    </div>

                    <div id="noteContainer" class="hidden">
                        <input type="text" id="customNote" placeholder="নোট লিখুন..." class="input-box border-emerald-300 bg-emerald-50">
                    </div>

                    <input type="number" id="amount" placeholder="৳ টাকার পরিমাণ" class="input-box text-2xl font-black text-emerald-900">
                    <button onclick="saveData()" id="saveBtn" class="w-full btn-green py-4 text-lg shadow-xl shadow-emerald-100">শিটে সেভ করুন 💾</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card p-6 border-l-8 border-emerald-500">
                <h3 class="font-bold text-emerald-900 mb-4 border-b pb-2 flex justify-between items-center text-sm">
                    আর্থিক প্রোফাইল (লাইভ) <span id="syncTime" class="text-[10px] text-emerald-400 font-normal"></span>
                </h3>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="p-3 bg-amber-50 rounded-2xl border border-amber-100">
                        <p class="text-[9px] font-bold text-amber-600 uppercase">Balance</p>
                        <p id="statBalance" class="font-black text-amber-800 text-sm md:text-base">৳ ০</p>
                    </div>
                    <div class="p-3 bg-emerald-50 rounded-2xl border border-emerald-100">
                        <p class="text-[9px] font-bold text-emerald-600 uppercase">Earnings</p>
                        <p id="statEarnings" class="font-black text-emerald-700 text-sm md:text-base">৳ ০</p>
                    </div>
                    <div class="p-3 bg-red-50 rounded-2xl border border-red-100">
                        <p class="text-[9px] font-bold text-red-600 uppercase">Liability</p>
                        <p id="statLiability" class="font-black text-red-700 text-sm md:text-base">৳ ০</p>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-2xl border border-blue-100">
                        <p class="text-[9px] font-bold text-blue-600 uppercase">Investment</p>
                        <p id="statInvestment" class="font-black text-blue-700 text-sm md:text-base">৳ ০</p>
                    </div>
                </div>
            </div>

            <button onclick="toggleReport()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-black transition-all flex items-center justify-center gap-2">
                📊 বিস্তারিত মাসিক রিপোর্ট (২৫-২৪ তারিখ)
            </button>

            <div class="glass-card p-6">
                <h4 class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-4">সাম্প্রতিক ৫টি এন্ট্রি</h4>
                <div id="recentList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="reportModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[32px] p-6 md:p-8 relative shadow-2xl overflow-hidden">
            <button onclick="toggleReport()" class="absolute top-4 right-6 text-slate-400 hover:text-black text-2xl">✕</button>
            <h2 class="text-xl font-bold text-emerald-900 mb-6 flex items-center gap-2">
                <span class="p-2 bg-emerald-100 rounded-lg text-lg">📊</span> ২৫ তারিখের সাইকেল সামারি
            </h2>
            <div id="modalContent" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <button onclick="fetchFromSheet()" class="sync-btn-floating">
        <span id="syncIcon" class="text-xl">🔄</span>
    </button>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzQx9egL64woXVHFwPFmEiaeViCGs586aYKCeWZwXXy4eT2rdA3S7hHa-dB4Q4qHpBZQ/exec";
        
        const mainBudgets = {
            Installment: 15829, Homeland: 10380, Residential: 9861, Sustenance: 12456, 
            Transport: 1038, Charity: 778, Essential: 519, Emergency: 519, Refreshment: 520, Savings: 0
        };

        const subBudgets = {
            "Loan (ঋণ পরিশোধ)": 15720, "Bank Interest (ব্যাংক মুনাফা/সুদ)": 0, "Others (অন্যান্য)": 0,
            "Parents (বাবা-মা)": 10380, "Village Cost (গ্রামের খরচ)": 0, "Others (অন্যান্য)": 0,
            "House Rent (বাসা ভাড়া)": 6000, "Electricity (বিদ্যুৎ বিল)": 1000, "Gas (গ্যাস বিল)": 1800, "Water (পানি বিল)": 100, "Internet (ইন্টারনেট বিল)": 650, "Mobile Bill (মোবাইল বিল)": 300, "Others (অন্যান্য)": 0,
            "Rice (চাল)": 1100, "Vegetable (শাক-সবজি)": 1500, "Milk (দুধ)": 1000, "Egg (ডিম)": 550, "Fruits (ফলমূল)": 400, "Fish (মাছ)": 3000, "Beef (গরুর মাংস)": 1000, "Chicken (মুরগির মাংস)": 500, "Grocery (মুদি সওদা)": 2600, "Stationary (ষ্টেশনারী)": 300, "Dry Food (শুকনা খাবার)": 300, "Others (অন্যান্য)": 200,
            "Workplace (অফিস যাতায়াত)": 1038, "Others (অন্যান্য)": 0,
            "Masjid (মসজিদ)": 500, "Sadakah (সাদাকাহ)": 278,
            "Learning (শিক্ষা)": 0, "Medical (চিকিৎসা)": 0, "Attire (পোশাক)": 0, "Others (অন্যান্য)": 519,
            "Hospital (হাসপাতাল)": 0, "Others (অন্যান্য)": 519,
            "Tour (ভ্রমণ)": 520, "Restuarent (রেস্তরা)": 0, "Others (অন্যান্য)": 0,
            "DPS (ডিপিএস)": 0, "FDR (এফডিআর)": 0, "Others (অন্যান্য)": 0

        };

        const subCategories = {
            Installment: ["Loan (ঋণ পরিশোধ)", "Bank Interest (ব্যাংক মুনাফা/সুদ)", "Others (অন্যান্য)"],
            Homeland: ["Parents (বাবা-মা)", "Village Cost (গ্রামের খরচ)", "Others (অন্যান্য)"],
            Residential: ["House Rent (বাসা ভাড়া)", "Electricity (বিদ্যুৎ বিল)", "Gas (গ্যাস বিল)", "Water (পানি বিল)", "Internet (ইন্টারনেট বিল)", "Mobile Bill (মোবাইল বিল)", "Others (অন্যান্য)"],
            Sustenance: ["Rice (চাল)", "Vegetable (শাক-সবজি)", "Milk (দুধ)", "Egg (ডিম)", "Fruits (ফলমূল)", "Fish (মাছ)", "Beef (গরুর মাংস)", "Chicken (মুরগির মাংস)", "Grocery (মুদি সওদা)", "Stationary (ষ্টেশনারী)", "Dry Food (শুকনা খাবার)", "Others (অন্যান্য)"],
            Transport: ["Workplace (অফিস যাতায়াত)", "Others (অন্যান্য)"],
            Charity: ["Masjid (মসজিদ)", "Sadakah (সাদাকাহ)"],
            Essential: ["Learning (শিক্ষা)", "Medical (চিকিৎসা)", "Attire (পোশাক)", "Others (অন্যান্য)"],
            Emergency: ["Hospital (হাসপাতাল)", "Others (অন্যান্য)"],
            Refreshment: ["Tour (ভ্রমণ)", "Restuarent (রেস্তরা)", "Others (অন্যান্য)"],
            Savings: ["DPS (ডিপিএস)", "FDR (এফডিআর)", "Others (অন্যান্য)"]
        };

        let expenses = [];
        let finance = { earnings: 0, liability: 0, investment: 0, currentBalance: 0 };
        let currentMode = 'expense';

        // রনি ভাই, এটিই আপনার কাস্টম ২৫-২৪ তারিখের লজিক
        function isCurrentCycle(dateStr) {
            if(!dateStr) return false;
            const entryDate = new Date(dateStr);
            const now = new Date();
            let cycleStartMonth, cycleStartYear;

            if (now.getDate() >= 25) {
                cycleStartMonth = now.getMonth();
                cycleStartYear = now.getFullYear();
            } else {
                const lastMonth = new Date();
                lastMonth.setMonth(now.getMonth() - 1);
                cycleStartMonth = lastMonth.getMonth();
                cycleStartYear = lastMonth.getFullYear();
            }

            const startDate = new Date(cycleStartYear, cycleStartMonth, 25);
            const endDate = new Date(cycleStartYear, cycleStartMonth + 1, 24);
            endDate.setHours(23, 59, 59);

            return entryDate >= startDate && entryDate <= endDate;
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeExp').className = `flex-1 py-3 rounded-xl font-bold text-sm ${mode==='expense'?'active-tab':'text-emerald-700'}`;
            document.getElementById('modeAdj').className = `flex-1 py-3 rounded-xl font-bold text-sm ${mode==='adjustment'?'active-tab':'text-emerald-700'}`;
            document.getElementById('expenseFields').classList.toggle('hidden', mode!=='expense');
            document.getElementById('adjFields').classList.toggle('hidden', mode!=='adjustment');
        }

        function updateSubCategories() {
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subCat');
            const infoDiv = document.getElementById('mainCatInfo');
            sub.innerHTML = `<option value="">উপ-খাত বেছে নিন</option>`;
            
            if (main && mainBudgets[main]) {
                const spent = getCycleSpentByMain(main); // Cycle logic applied
                const remaining = mainBudgets[main] - spent;
                infoDiv.innerHTML = `
                    <span class="budget-info-tag bg-emerald-100 text-emerald-700">বাজেট: ৳${mainBudgets[main]}</span>
                    <span class="budget-info-tag bg-blue-100 text-blue-700">খরচ: ৳${spent}</span>
                    <span class="budget-info-tag ${remaining < 0 ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">বাকি: ৳${remaining}</span>
                `;
                if (subCategories[main]) subCategories[main].forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`);
            } else { infoDiv.innerHTML = ""; }
            document.getElementById('subCatInfo').innerHTML = "";
        }

        function updateSubDetailedInfo(subVal) {
            const infoDiv = document.getElementById('subCatInfo');
            const main = document.getElementById('mainCat').value;
            if (subVal && main) {
                const spent = getCycleSpentBySub(main, subVal); // Cycle logic applied
                const budget = subBudgets[subVal] || 0;
                const remaining = budget - spent;
                let html = `<span class="budget-info-tag bg-slate-100 text-slate-600">খরচ: ৳${spent}</span>`;
                if (budget > 0) {
                    html = `
                        <span class="budget-info-tag bg-indigo-100 text-indigo-700">বাজেট: ৳${budget}</span>
                        <span class="budget-info-tag bg-blue-100 text-blue-700">খরচ: ৳${spent}</span>
                        <span class="budget-info-tag ${remaining < 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">বাকি: ৳${remaining}</span>
                    `;
                }
                infoDiv.innerHTML = html;
            } else { infoDiv.innerHTML = ""; }
            checkOthers(subVal);
        }

        function getCycleSpentByMain(main) {
            return expenses.filter(ex => ex.mode === 'expense' && ex.main === main && isCurrentCycle(ex.date))
                           .reduce((sum, ex) => sum + parseFloat(ex.amount), 0);
        }

        function getCycleSpentBySub(main, sub) {
            return expenses.filter(ex => ex.mode === 'expense' && ex.main === main && ex.sub.startsWith(sub) && isCurrentCycle(ex.date))
                           .reduce((sum, ex) => sum + parseFloat(ex.amount), 0);
        }

        async function fetchFromSheet() {
            const icon = document.getElementById('syncIcon');
            icon.classList.add('sync-loader');
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.expenses) {
                    expenses = data.expenses;
                    calculateFinance();
                    refreshUI();
                }
            } catch (e) { alert("সিঙ্ক এরর!"); }
            icon.classList.remove('sync-loader');
            document.getElementById('syncTime').innerText = "Last sync: " + new Date().toLocaleTimeString();
        }

        function calculateFinance() {
            let tempFinance = { earnings: 51000, liability: 100000, investment: 500, currentBalance: 0 };
            let totalAllTimeExpense = 0;
            expenses.forEach(ex => {
                const amt = parseFloat(ex.amount) || 0;
                if(ex.mode === 'expense') totalAllTimeExpense += amt;
                else if(ex.mode === 'adjustment') {
                    if(ex.main === 'Earnings') tempFinance.earnings += amt;
                    if(ex.main === 'Investment') tempFinance.investment += amt;
                    if(ex.main === 'Liability') {
                        if(ex.sub.includes('(-)') || ex.sub.includes('Paid')) tempFinance.liability -= amt;
                        else tempFinance.liability += amt;
                    }
                }
            });
            tempFinance.currentBalance = tempFinance.earnings - (totalAllTimeExpense + tempFinance.investment);
            finance = tempFinance;
        }

        function refreshUI() {
            document.getElementById('recentList').innerHTML = expenses.slice(-5).reverse().map(ex => `
                <div class="p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl text-[11px] flex justify-between shadow-sm">
                    <div><b>${ex.sub}</b><br><span class="text-slate-400 text-[9px]">${ex.date}</span></div>
                    <div class="font-black text-emerald-800">৳ ${parseFloat(ex.amount).toLocaleString()}</div>
                </div>
            `).join('') || "<p class='text-center text-slate-300 py-4'>No Entry Found</p>";

            document.getElementById('statEarnings').innerText = `৳ ${finance.earnings.toLocaleString()}`;
            document.getElementById('statLiability').innerText = `৳ ${finance.liability.toLocaleString()}`;
            document.getElementById('statInvestment').innerText = `৳ ${finance.investment.toLocaleString()}`;
            document.getElementById('statBalance').innerText = `৳ ${finance.currentBalance.toLocaleString()}`;
            
            if(document.getElementById('mainCat').value) updateSubCategories();
        }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const main = currentMode === 'expense' ? document.getElementById('mainCat').value : document.getElementById('adjMain').value;
            const sub = currentMode === 'expense' ? document.getElementById('subCat').value : document.getElementById('adjSub').value;
            const note = document.getElementById('customNote').value;
            const amount = document.getElementById('amount').value;
            const date = document.getElementById('date').value;

            if(!date || !amount || !main || !sub) return alert("দয়া করে, সব তথ্য দিন!");

            btn.innerText = "পাঠানো হচ্ছে..."; btn.disabled = true;

            const payload = { date, amount, main, sub: sub === 'Others' ? `Others (${note})` : sub, mode: currentMode };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("সফলভাবে আপডেট হয়েছে!");
                document.getElementById('amount').value = "";
                fetchFromSheet();
            } catch(e) { alert("কানেকশন এরর!"); }
            btn.innerText = "শিটে সেভ করুন 💾"; btn.disabled = false;
        }

        function toggleReport() {
            const modal = document.getElementById('reportModal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                const spentStats = {};
                expenses.filter(ex => isCurrentCycle(ex.date) && ex.mode === "expense").forEach(ex => { 
                    spentStats[ex.main] = (spentStats[ex.main] || 0) + parseFloat(ex.amount); 
                });
                let html = "";
                for (let cat in mainBudgets) {
                    let spent = spentStats[cat] || 0;
                    let p = Math.min((spent / mainBudgets[cat]) * 100, 100);
                    html += `
                        <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                            <div class="flex justify-between items-center mb-2">
                                <div><p class="font-bold text-emerald-900">${cat}</p><p class="text-[10px] text-emerald-500 font-bold uppercase">বরাদ্দ: ৳${mainBudgets[cat]}</p></div>
                                <p class="font-black ${spent > mainBudgets[cat] ? 'text-red-600' : 'text-emerald-800'}">৳ ${spent}</p>
                            </div>
                            <div class="h-1.5 w-full bg-white rounded-full overflow-hidden">
                                <div class="h-full ${spent > mainBudgets[cat] ? 'bg-red-500' : 'bg-emerald-500'}" style="width: ${p}%"></div>
                            </div>
                        </div>`;
                }
                document.getElementById('modalContent').innerHTML = html;
            }
        }

        function checkOthers(val) { document.getElementById('noteContainer').classList.toggle('hidden', val !== 'Others'); }
        
        function updateAdjSub() {
            const main = document.getElementById('adjMain').value;
            const sub = document.getElementById('adjSub');
            sub.innerHTML = `<option value="">উপ-খাত বেছে নিন</option>`;
            const adjSubCategories = {
                Earnings: ["Salary", "Bonus", "Dividend", "Others"],
                Liability: ["Personal Loan (+)", "Bank Loan (+)", "Loan Paid (-)", "Installment Paid (-)"],
                Investment: ["Share Market", "Savings Certificate", "Fixed Deposit", "Others"]
            };
            if (adjSubCategories[main]) adjSubCategories[main].forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`);
        }

        fetchFromSheet();
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
